<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ParkEase - Choose Role</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
    }

    body {
      background-color: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      border: 2px #ffea00;
    }

    header {
      background-color: #000;
      padding: 30px 50px;
    }

    .navbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      font-size: 15px;
    }

    .nav-right {
      display: flex;
      gap: 50px; 
    }

    .nav-right a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 0px 20px;
    }

    .main-content {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .main-content h2 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    /* Updated gap for matching spacing */
    .roles {
      display: flex;
      justify-content: center;
      gap: 40px; /* same as Public/Private boxes */
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 40px;
    }

    .role-box {
      background-color: #ffea00;
      color: black;
      width: 180px;
      height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .role-box:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 255, 0, 0.6);
    }

    .role-box img {
      width: 60px;
      height: 60px;
      margin-bottom: 10px;
    }

    .login-link {
      font-size: 16px;
      margin-top: 10px;
    }

    .login-link a {
      color: white;
      font-weight: bold;
      text-decoration: underline;
    }

    footer {
      display: flex;
      justify-content: space-between;
      padding: 30px 50px;
      font-size: 15px;
      background-color: #000;
      flex-wrap: wrap;
      font-weight: bold;
    }

    footer a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
    }

    footer a span {
      color: #ffea00;
    }

    footer div:last-child {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="nav-right">
<a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('aboutus') }}">About us</a>
<a href="{{ url_for('contact') }}">Contact</a>
<a href="{{ url_for('login') }}">Log In</a>
      </div>
    </nav>
  </header>

  <div class="main-content">
    <h2>Sign Up as...</h2>
    <div class="roles">
      <div class="role-box" onclick="selectRole('lender')">
        <img src="https://img.icons8.com/ios-filled/100/parking--v1.png" alt="Lender Icon"/>
        Lender
      </div>
      <div class="role-box" onclick="selectRole('user')">
        <img src="https://img.icons8.com/ios-filled/100/marker.png" alt="User Icon"/>
        User
      </div>
    </div>
    <p class="login-link">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>

  <footer>
    <div>
      © <a href="#">Park<span class="highlight">Ease.</span></a>
    </div>
    <div>
      <a href="{{ url_for('terms') }}">Terms and Conditions</a>
<a href="{{ url_for('privacypolicy') }}">Privacy Policy</a>
    </div>
  </footer>

  <script>
    function selectRole(role) {
      window.location.href = `/signup?role=${role}`;
    }
  </script>

</body>
</html>
