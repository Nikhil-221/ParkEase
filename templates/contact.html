<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ParkEase - Contact</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: 'Poppins', sans-serif;
    }

    header {
      background-color: #000;
      padding: 30px 50px;
    }

    .navbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      font-size: 15px;
    }

    .nav-right {
      display: flex;
      gap: 50px; 
    }

    .nav-right a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 0px 20px;
    }

    .nav-right a.active {
      color: #ffea00;
    }

    .contact-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 80px;
      height: 80vh;
    }

    .contact-left {
      flex: 1;
    }

    .contact-left h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .contact-left p {
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 2;
    }

    /* --- Glowing Social Icons --- */
    .social-icons {
      margin-top: 30px;
      display: flex;
      gap: 20px;
    }

    .social-icons i {
      color: #ffea00;
      font-size: 1.7rem;
      cursor: pointer;
      transition: transform 0.3s ease, text-shadow 0.3s ease;
      text-shadow: 0 0 8px rgba(255, 234, 0, 0.5);
    }

    .social-icons i:hover {
      transform: scale(1.2);
      text-shadow: 0 0 20px rgba(255, 234, 0, 0.9);
      color: #fff;
    }

    .contact-right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-box {
      background: #ffea00;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .form-box textarea {
      width: 100%;
      height: 150px;
      padding: 15px;
      font-size: 1rem;
      border-radius: 15px;
      border: none;
      resize: none;
      outline: none;
      font-family: 'Poppins', sans-serif;
      background-color: black;
      color: white;
    }

    .form-box button {
      margin-top: 20px;
      background-color: black;
      color: #ffea00;
      font-weight: bold;
      padding: 10px 30px;
      font-size: 1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }

    footer {
      display: flex;
      justify-content: space-between;
      padding: 30px 50px;
      font-size: 15px;
      background-color: #000;
      flex-wrap: wrap;
      font-weight: bold;
    }

    footer a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
    }

    footer a span {
      color: #ffea00;
    }

    footer div:last-child {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="nav-right">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('aboutus') }}">About us</a>
        <a href="{{ url_for('contact') }}" class="active">Contact</a>
        <a href="{{ url_for('login') }}" class="login">Log In</a>
      </div>
    </nav>
  </header>

  <section class="contact-section">
    <div class="contact-left">
      <h2><span style="color: #ffea00;">Facing an issue?</span></h2>
      <p>
        Register your <br />
        complains here. <br />
        or <br />
        Contact Us!
      </p>
      <div class="social-icons">
        <i class="fab fa-instagram"></i>
        <i class="fab fa-twitter"></i>
        <i class="fab fa-youtube"></i>
      </div>
    </div>

    <div class="contact-right">
      <div class="form-box">
        <textarea placeholder="Type your complains here..."></textarea>
        <button>Submit</button>
      </div>
    </div>
  </section>

  <footer>
    <div>
      © <a href="#">Park<span class="highlight">Ease.</span></a>
    </div>
    <div>
      <a href="{{ url_for('terms') }}">Terms and Conditions</a>
      <a href="{{ url_for('privacypolicy') }}">Privacy Policy</a>
    </div>
  </footer>
</body>
</html>
