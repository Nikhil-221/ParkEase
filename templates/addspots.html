<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Spot - ParkEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #000;
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #000;
      padding: 30px 50px;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .logo span {
      color: #ffea00;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .navbar a.active {
      color: #ffea00;
    }

    .profile {
      position: relative;
      cursor: pointer;
    }

    .profile i {
      font-size: 1.5rem;
    }

    .dropdown {
      position: absolute;
      top: 35px;
      right: 0;
      background-color: #ffffff;
      color: #000000;
      border-radius: 8px;
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 10px;
      min-width: 180px;
      font-weight: 600;
      z-index: 100;
    }

    .dropdown a {
      text-decoration: none;
      color: black;
    }

    .dropdown a:hover {
      text-decoration: underline;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .form-container {
      padding: 30px;
      max-width: 500px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: inset 10px 10px 30px #b3b3b3, inset -10px -10px 30px #e6e6e6;
      background: linear-gradient(145deg, #b3b3b3, #e6e6e6);
      border-radius: 1.5rem;
    }

    .form-group {
      background: #ffffff;
      color: black;
      border-radius: 15px;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-size: 1rem;
      font-weight: 500;
    }

    .form-group input[type="time"] {
      width: 45%;
    }

    .form-group input[type="file"] {
      display: none;
    }

    /* Time separator */
    .time-separator {
      margin: 0 10px;
      font-weight: normal;
      color: #333;
    }

    /* Upload label fix */
    .upload-label {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1rem;
    }

    .upload-label span {
      font-weight: normal;
      color: #333;
    }

    .upload-label img {
      width: 24px;
    }

    .submit-btn {
      background: #ffea00;
      border-radius: 50px;
      padding: 1rem 2rem;
      font-weight: bold;
      color: black;
      border: none;
      cursor: pointer;
      align-self: center;
      font-size: 1rem;
      transition: 0.3s;
    }

    .submit-btn:hover {
      background-color: #ffe100;
    }

    footer {
      display: flex;
      justify-content: space-between;
      padding: 30px 50px;
      font-size: 15px;
      background-color: #000;
      font-weight: bold;
      flex-wrap: wrap;
    }

    footer a, footer div {
      color: white;
      text-decoration: none;
    }

    footer a span {
      color: #ffea00;
    }

    footer div:last-child {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <header>
    <nav class="navbar">
      <div class="logo">
        <a href="{{ url_for('lenderdashboard') }}">Lender <span>Dashboard</span></a>
      </div>

      <div class="nav-right">
        <a href="{{ url_for('bookings') }}">Bookings</a>
        <a href="{{ url_for('lendercontact') }}">Contact</a>
        <div class="profile" onclick="toggleDropdown()">
          <i class="fas fa-user-circle"></i>
          <div class="dropdown" id="dropdownMenu">
            <a href="{{ url_for('lenderaccount') }}">Your Account</a>
            <a href="{{ url_for('logout') }}">Log out</a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <form class="form-container" id="spotForm" method="POST" action="{{ url_for('addspots') }}" enctype="multipart/form-data">
      <div class="form-group">
        <input type="text" name="address" placeholder="Enter the Address of the spot you are listing" required />
      </div>
      <div class="form-group">
        <input type="text" name="price" placeholder="List your price for a day" required />
      </div>
      <div class="form-group">
        <input type="text" name="vehicleType" placeholder="What type of vehicle can be parked in your spot?" required />
      </div>
      
      <div class="form-group">
        <input type="time" name="slotFrom" required />
        <span class="time-separator">to</span>
        <input type="time" name="slotTill" required />
      </div>

      <div class="form-group">
        <label for="imageUpload" class="upload-label">
          <span>Upload an Image</span>
          <img src="https://img.icons8.com/ios-glyphs/30/camera--v1.png" alt="Upload" />
        </label>
        <input type="file" id="imageUpload" name="image" />
      </div>

      <div class="form-group">
        <input type="text" name="contact" placeholder="Phone Number/Personal QR" required />
      </div>
      
      <button class="submit-btn" type="submit">List Your Space!</button>
    </form>
  </main>

  <footer>
    <div>© <a href="#">Park<span>Ease.</span></a></div>
    <div>
      <a href="{{ url_for('terms') }}">Terms and Conditions</a>
      <a href="{{ url_for('privacypolicy') }}">Privacy Policy</a>
    </div>
  </footer>

  <!-- SCRIPT -->
  <script>
    // Show/hide profile dropdown
    function toggleDropdown() {
      const dropdown = document.getElementById("dropdownMenu");
      dropdown.style.display = dropdown.style.display === "flex" ? "none" : "flex";
    }

    // Close dropdown on outside click
    document.addEventListener("click", function (event) {
      const profile = document.querySelector(".profile");
      const dropdown = document.getElementById("dropdownMenu");
      if (!profile.contains(event.target)) {
        dropdown.style.display = "none";
      }
    });
  </script>
</body>
</html>
