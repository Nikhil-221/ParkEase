<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ParkEase - Sign Up</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
    }

    body {
      background-color: #000000;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #000000;
      padding: 30px 50px;
    }

    .navbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      font-size: 15px;
    }

    .nav-right {
      display: flex;
      gap: 50px; 
    }

    .nav-right a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 0px 20px;
    }

    .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-grow: 1;
      padding: 60px 80px;
    }

    .left-panel h1 {
      font-size: 48px;
      font-weight: bold;
      color: #ffffff;
    }

    .left-panel h1 span {
      color: #ffff00;
    }

    .form-card {
      background: radial-gradient(circle, #e0e0e0, #bfbfbf);
      border-radius: 20px;
      padding: 40px;
      width: 380px;
    }

    .form-card form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, select {
      padding: 12px;
      border: none;
      background-color: #000000;
      color: white;
      font-size: 16px;
      border-radius: 2px;
    }

    select {
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
      background-repeat: no-repeat;
      background-position-x: 95%;
      background-position-y: 50%;
    }

    .create-btn {
      background-color: black;
      color: #ffea00;
      font-weight: bold;
      border-radius: 100px;
      padding: 12px;
      border: none;
      cursor: pointer;
      font-size: 18px;
    }

    footer {
      display: flex;
      justify-content: space-between;
      padding: 30px 50px;
      font-size: 15px;
      background-color: #000;
      flex-wrap: wrap;
      font-weight: bold;
    }

    footer a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
    }

    footer a span {
      color: #ffea00;
    }

    footer div:last-child {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="nav-right">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('aboutus') }}">About us</a>
        <a href="{{ url_for('contact') }}">Contact</a>
        <a href="{{ url_for('login') }}" class="login">Log In</a>
      </div>
    </nav>
  </header>


  <main class="container">
    <section class="left-panel">
      <h1>Let’s get<br><span>Started!</span></h1>
    </section>

    <section class="form-card">
      <form id="signupForm" method="POST" action="{{ url_for('signup') }}">
  <input type="text" name="fullname" placeholder="Full name" required />
  <input type="email" name="email" placeholder="Email" required />
  <input type="password" name="password" placeholder="Password" required />
  <input type="password" name="confirm_password" placeholder="Confirm Password" required />
  <input type="tel" name="phone" placeholder="Phone Number" required />
  <select id="roleSelect" name="role" required>
    <option value="" disabled hidden>Sign up as..</option>
    <option value="lender">Lender</option>
    <option value="user">User</option>
  </select>
  <button type="submit" class="create-btn">Create Account</button>
</form>

    </section>
  </main>

  <footer>
    <div>
      © <a href="#">Park<span class="highlight">Ease.</span></a>
    </div>
    <div>
      <a href="{{ url_for('terms') }}">Terms and Conditions</a>
      <a href="{{ url_for('privacypolicy') }}">Privacy Policy</a>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const urlParams = new URLSearchParams(window.location.search);
      const selectedRole = urlParams.get('role');
      const roleSelect = document.getElementById("roleSelect");

      if (selectedRole === "user" || selectedRole === "lender") {
        roleSelect.value = selectedRole;
      }

      const form = document.getElementById("signupForm");
    });
  </script>
</body>
</html>
