<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ParkEase Sign In</title>
  <style>
   

    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: "Montserrat", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

   header {
      background-color: #000;
      padding: 30px 50px;
    }

    .navbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      font-size: 15px;
    }

    .nav-right {
      display: flex;
      gap: 50px; 
    }

    .nav-right a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 0px 20px;
    }

    .nav-right a.active {
      color: #ffea00;
    }
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 12rem;
    }

    .container {
      
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    
      .container {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        gap: 0;
      }

    .welcome-text {
      color: #ffea00;
      font-weight: 800;
      font-size: 3rem;
      max-width: 20rem;
    }

     
      .welcome-text {
        font-size: 3rem;
      }
    

    .form-wrapper {
      background: linear-gradient(145deg, #b3b3b3, #e6e6e6);
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow: inset 10px 10px 30px #b3b3b3, inset -10px -10px 30px #e6e6e6;
      width: 100%;
      max-width: 24rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background-color: black;
      color: white;
      padding: 0.75rem 1rem;
      border: none;
      outline: none;
      font-family: "Montserrat", sans-serif;
      font-size: 1rem;
    }

    input::placeholder {
      color: white;
    }

    button {
      background-color: black;
      color: #ffea00;
      font-weight: 800;
      border-radius: 9999px;
      padding: 0.75rem 3rem;
      font-size: 1.125rem;
      border: none;
      cursor: pointer;
      align-self: center;
      display: block;
    }

    footer {
      display: flex;
      justify-content: space-between;
      padding: 30px 50px;
      font-size: 15px;
      background-color: #000;
      flex-wrap: wrap;
      font-weight: bold;
    }

    footer a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
    }

    footer a span {
      color: #ffea00;
    }

    footer div:last-child {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="nav-right">
        <a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('aboutus') }}">About us</a>
<a href="{{ url_for('contact') }}">Contact</a>
<a href="{{ url_for('login') }}">Log In</a>

      </div>
    </nav>
  </header>

  <main>
    <div class="container">
      <div class="welcome-text">
        Welcome <br />Back!
      </div>

      <div class="form-wrapper">
        <form method="POST" action="{{ url_for('login') }}">
  <input type="email" name="email" placeholder="Email" required />
  <input type="password" name="password" placeholder="Password" required />
  <button type="submit">Sign In</button>
</form>

      </div>
    </div>
  </main>

  <footer>
    <div>
      © <a href="#">Park<span class="highlight">Ease.</span></a>
    </div>
    <div>
      <a href="{{ url_for('terms') }}">Terms and Conditions</a>
<a href="{{ url_for('privacypolicy') }}">Privacy Policy</a>

    </div>
  </footer>
</body>
</html>
